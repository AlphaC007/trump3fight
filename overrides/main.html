{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta name="description" content="The $TRUMP Thesis Lab: Bull-First intelligence hub with daily CIO reports, trend analytics, and machine-readable agent entrypoints." />
  <meta name="keywords" content="TRUMP meme coin, $TRUMP, bull thesis, CIO report, crypto trend analysis, on-chain intelligence, agent-readable research" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <link rel="alternate" type="text/plain" title="LLM Access Contract" href="{{ config.site_url }}llms.txt" />
  <link rel="alternate" type="application/json" title="Agent Index" href="{{ config.site_url }}agent-index.json" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The $TRUMP Thesis Lab" />
  <meta property="og:title" content="The $TRUMP Thesis Lab" />
  <meta property="og:description" content="Bull-First intelligence hub tracking the $TRUMP path to $100 with daily reports and trend analytics." />
  <meta property="og:url" content="{{ config.site_url }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/trump-fight-logo-og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The $TRUMP Thesis Lab" />
  <meta name="twitter:description" content="Bull-First intelligence hub with daily CIO reports and trend analytics." />
  <meta name="twitter:image" content="{{ config.site_url }}assets/trump-fight-logo-og.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "The $TRUMP Thesis Lab",
    "url": "{{ config.site_url }}",
    "description": "Bull-First intelligence hub for $TRUMP with daily CIO reports and trend analytics.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "{{ config.site_url }}search.html?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
{% endblock %}
