name: daily-bull-first-report

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily bull-first report
        run: |
          python scripts/generate_report.py

      - name: Build CIO hub (latest + archive)
        run: |
          python scripts/build_cio_hub.py

      - name: Validate CIO hub freshness
        run: |
          python scripts/check_cio_hub_freshness.py

      - name: Commit and push report + hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/cio_briefings/*-CIO-Report.md docs/cio-reports/latest.md docs/cio-reports/archive/*-CIO-Report.md
          git diff --cached --quiet || git commit -m "chore(report): daily CIO report + hub sync"
          git pull --rebase origin main
          git push

      - name: Verify push reached remote main
        run: |
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          echo "local=$LOCAL"
          echo "remote=$REMOTE"
          test "$LOCAL" = "$REMOTE"
