name: daily-bull-first-report

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily bull-first report
        run: |
          python scripts/generate_report.py

      - name: Build CIO hub (latest + archive)
        run: |
          python scripts/build_cio_hub.py

      - name: Validate CIO hub freshness
        run: |
          python scripts/check_cio_hub_freshness.py

      - name: Regenerate manifest.json
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          snapshot_path="data/snapshots/${today}.snapshot.json"
          trends_path="docs/assets/data/trends.json"
          cio_path="reports/cio_briefings/${today}-CIO-Report.md"

          hash_or_unavailable() {
            local path="$1"
            if [ -f "$path" ]; then
              sha256sum "$path" | awk '{print $1}'
            else
              echo "unavailable"
            fi
          }

          snapshot_sha="$(hash_or_unavailable "$snapshot_path")"
          trends_sha="$(hash_or_unavailable "$trends_path")"
          cio_sha="$(hash_or_unavailable "$cio_path")"

          export TODAY="$today"
          export GENERATED_AT="$generated_at"
          export SNAPSHOT_PATH="$snapshot_path"
          export SNAPSHOT_SHA="$snapshot_sha"
          export TRENDS_PATH="$trends_path"
          export TRENDS_SHA="$trends_sha"
          export CIO_PATH="$cio_path"
          export CIO_SHA="$cio_sha"

          python - <<'PY'
          import json
          import os

          manifest = {
            "project": "trump-thesis-lab",
            "manifest_version": "1.0.0",
            "generated_at_utc": os.environ["GENERATED_AT"],
            "latest_snapshot_date": os.environ["TODAY"],
            "pipeline_version": "v1.0.0-Stable-RAG",
            "artifacts": {
              "snapshot": {
                "path": os.environ["SNAPSHOT_PATH"],
                "sha256": os.environ["SNAPSHOT_SHA"],
              },
              "trends_dataset": {
                "path": os.environ["TRENDS_PATH"],
                "sha256": os.environ["TRENDS_SHA"],
              },
              "cio_report": {
                "path": os.environ["CIO_PATH"],
                "sha256": os.environ["CIO_SHA"],
              },
            },
            "source_priority": [
              "binance-web3",
              "okx-onchainos",
              "bitget-wallet",
            ],
          }

          with open("data/manifest.json", "w", encoding="utf-8") as fh:
            json.dump(manifest, fh, indent=2)
            fh.write("\n")
          PY

      - name: Refresh README freshness dates
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sed -i "s#- Latest snapshot: `data/snapshots/2026-03-04.snapshot.json`#- Latest snapshot: `data/snapshots/${today}.snapshot.json`#" README.md
          sed -i "s#- Tag: `daily-2026-03-04`#- Tag: `daily-${today}`#" README.md
          sed -i "s#- URL: `https://github.com/AlphaC007/trump3fight/releases/tag/daily-2026-03-04`#- URL: `https://github.com/AlphaC007/trump3fight/releases/tag/daily-${today}`#" README.md
          sed -i "s#- Published at: `2026-03-04T21:58:18Z`#- Published at: `${published_at}`#" README.md

      - name: Commit and push report + hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/manifest.json reports/cio_briefings/*-CIO-Report.md docs/cio-reports/latest.md docs/cio-reports/archive/*-CIO-Report.md
          git diff --cached --quiet || git commit -m "chore(report): daily CIO report + hub sync"
          git pull --rebase origin main
          git push

      - name: Verify push reached remote main
        run: |
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          echo "local=$LOCAL"
          echo "remote=$REMOTE"
          test "$LOCAL" = "$REMOTE"
